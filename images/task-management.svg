<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <!-- Card background -->
  <rect x="60" y="50" width="480" height="240" rx="10" fill="rgba(255,255,255,0.1)"/>
  <!-- Header bar -->
  <rect x="60" y="50" width="480" height="44" rx="10" fill="rgba(255,255,255,0.15)"/>
  <circle cx="88" cy="72" r="7" fill="#ff5f57"/>
  <circle cx="112" cy="72" r="7" fill="#febc2e"/>
  <circle cx="136" cy="72" r="7" fill="#28c840"/>
  <text x="170" y="77" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Task Management System</text>
  <!-- Task items -->
  <rect x="80" y="115" width="200" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="88" y="128" width="12" height="12" rx="3" fill="#a5f3fc"/>
  <text x="107" y="139" font-family="Arial,sans-serif" font-size="12" fill="white">Design database schema</text>
  <rect x="80" y="160" width="200" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="88" y="173" width="12" height="12" rx="3" fill="#86efac"/>
  <text x="107" y="184" font-family="Arial,sans-serif" font-size="12" fill="white">Build REST endpoints</text>
  <rect x="80" y="205" width="200" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="88" y="218" width="12" height="12" rx="3" fill="#fde68a"/>
  <text x="107" y="229" font-family="Arial,sans-serif" font-size="12" fill="white">User authentication</text>
  <!-- Status columns -->
  <rect x="310" y="105" width="90" height="26" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="355" y="122" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">In Progress</text>
  <rect x="310" y="140" width="90" height="26" rx="5" fill="#86efac" fill-opacity="0.3"/>
  <text x="355" y="157" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">Done</text>
  <rect x="310" y="175" width="90" height="26" rx="5" fill="rgba(255,255,255,0.1)"/>
  <text x="355" y="192" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">Todo</text>
  <!-- Tags -->
  <rect x="420" y="105" width="55" height="22" rx="11" fill="rgba(255,255,255,0.2)"/>
  <text x="447" y="120" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">React</text>
  <rect x="420" y="135" width="70" height="22" rx="11" fill="rgba(255,255,255,0.2)"/>
  <text x="455" y="150" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">Node.js</text>
  <rect x="420" y="165" width="72" height="22" rx="11" fill="rgba(255,255,255,0.2)"/>
  <text x="456" y="180" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">MongoDB</text>
</svg>
