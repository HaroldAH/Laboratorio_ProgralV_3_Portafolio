<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <!-- App frame -->
  <rect x="60" y="45" width="480" height="250" rx="10" fill="rgba(255,255,255,0.12)"/>
  <!-- Sidebar -->
  <rect x="60" y="45" width="150" height="250" rx="10" fill="rgba(0,0,0,0.2)"/>
  <text x="135" y="75" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Channels</text>
  <!-- Channel items -->
  <rect x="70" y="90" width="130" height="30" rx="6" fill="rgba(255,255,255,0.25)"/>
  <text x="85" y="110" font-family="Arial,sans-serif" font-size="12" fill="white"># general</text>
  <rect x="70" y="128" width="130" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="85" y="148" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.7)"># dev-team</text>
  <rect x="70" y="166" width="130" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="85" y="186" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.7)"># random</text>
  <!-- Chat area header -->
  <rect x="210" y="45" width="330" height="40" rx="10" fill="rgba(255,255,255,0.15)"/>
  <text x="230" y="69" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white"># general</text>
  <text x="460" y="69" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">12 online</text>
  <!-- Messages -->
  <circle cx="226" cy="110" r="14" fill="rgba(255,255,255,0.3)"/>
  <text x="226" y="115" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">JD</text>
  <rect x="248" y="96" width="180" height="32" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="260" y="117" font-family="Arial,sans-serif" font-size="11" fill="white">Hey! How's the project?</text>
  <circle cx="516" cy="148" r="14" fill="rgba(255,255,255,0.3)"/>
  <text x="516" y="153" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">HA</text>
  <rect x="323" y="134" width="185" height="32" rx="8" fill="rgba(255,255,255,0.35)"/>
  <text x="335" y="155" font-family="Arial,sans-serif" font-size="11" fill="white">Going great, thanks! 🚀</text>
  <circle cx="226" cy="196" r="14" fill="rgba(255,255,255,0.3)"/>
  <text x="226" y="201" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">JD</text>
  <rect x="248" y="182" width="160" height="32" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="260" y="203" font-family="Arial,sans-serif" font-size="11" fill="white">Can you share the repo?</text>
  <!-- Input -->
  <rect x="215" y="262" width="315" height="26" rx="13" fill="rgba(255,255,255,0.2)"/>
  <text x="232" y="279" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Type a message...</text>
</svg>
