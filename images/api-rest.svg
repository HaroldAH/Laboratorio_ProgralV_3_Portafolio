<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <!-- Terminal / API frame -->
  <rect x="50" y="40" width="500" height="260" rx="10" fill="rgba(0,0,0,0.4)"/>
  <rect x="50" y="40" width="500" height="36" rx="10" fill="#1a1a2e"/>
  <circle cx="78" cy="58" r="7" fill="#ff5f57"/>
  <circle cx="102" cy="58" r="7" fill="#febc2e"/>
  <circle cx="126" cy="58" r="7" fill="#28c840"/>
  <text x="300" y="64" font-family="monospace,Arial" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">API REST – Swagger Docs</text>
  <!-- GET endpoint -->
  <rect x="70" y="90" width="460" height="32" rx="5" fill="rgba(16,185,129,0.15)"/>
  <rect x="74" y="94" width="44" height="22" rx="4" fill="#10b981"/>
  <text x="96" y="109" font-family="monospace,Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">GET</text>
  <text x="128" y="110" font-family="monospace,Arial" font-size="12" fill="#86efac">/api/users</text>
  <text x="460" y="110" font-family="monospace,Arial" font-size="11" fill="rgba(255,255,255,0.4)">200 OK</text>
  <!-- POST endpoint -->
  <rect x="70" y="132" width="460" height="32" rx="5" fill="rgba(250,204,21,0.12)"/>
  <rect x="74" y="136" width="46" height="22" rx="4" fill="#eab308"/>
  <text x="97" y="151" font-family="monospace,Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">POST</text>
  <text x="130" y="152" font-family="monospace,Arial" font-size="12" fill="#fde68a">/api/users</text>
  <text x="455" y="152" font-family="monospace,Arial" font-size="11" fill="rgba(255,255,255,0.4)">201 Created</text>
  <!-- PUT endpoint -->
  <rect x="70" y="174" width="460" height="32" rx="5" fill="rgba(59,130,246,0.15)"/>
  <rect x="74" y="178" width="40" height="22" rx="4" fill="#3b82f6"/>
  <text x="94" y="193" font-family="monospace,Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">PUT</text>
  <text x="124" y="194" font-family="monospace,Arial" font-size="12" fill="#93c5fd">/api/users/{id}</text>
  <text x="455" y="194" font-family="monospace,Arial" font-size="11" fill="rgba(255,255,255,0.4)">200 OK</text>
  <!-- DELETE endpoint -->
  <rect x="70" y="216" width="460" height="32" rx="5" fill="rgba(239,68,68,0.15)"/>
  <rect x="74" y="220" width="56" height="22" rx="4" fill="#ef4444"/>
  <text x="102" y="235" font-family="monospace,Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">DELETE</text>
  <text x="140" y="236" font-family="monospace,Arial" font-size="12" fill="#fca5a5">/api/users/{id}</text>
  <text x="445" y="236" font-family="monospace,Arial" font-size="11" fill="rgba(255,255,255,0.4)">204 No Content</text>
  <!-- Bottom label -->
  <text x="300" y="278" font-family="monospace,Arial" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">Node.js · PostgreSQL · Docker · JWT Auth</text>
</svg>
